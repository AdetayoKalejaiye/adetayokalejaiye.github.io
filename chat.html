<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drift - Chat with Chidinma</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
    }
    
    .phone {
      max-width: 375px;
      height: 812px;
      margin: 20px auto;
      background: #000;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 12px #1a1a1a;
      position: relative;
    }
    
    .screen {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
    }
    
    /* AppBar */
    .appbar {
      background: #000;
      padding: 12px 16px;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .appbar-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    
    .appbar-actions {
      display: flex;
      gap: 12px;
    }
    
    .icon-btn {
      background: none;
      border: none;
      color: #e0e0e0;
      cursor: pointer;
      padding: 4px;
      font-size: 20px;
    }
    
    .back-btn {
      background: none;
      border: none;
      color: #2196F3;
      font-size: 15px;
      cursor: pointer;
      font-weight: 500;
      text-decoration: none;
    }
    
    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      background: #000;
    }
    
    .content::-webkit-scrollbar { width: 0; }
    
    /* Bottom Nav */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      background: #000;
      border-top: 0.5px solid rgba(255,255,255,0.08);
      padding: 8px 0 12px;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: none;
      border: none;
      color: #808080;
      cursor: pointer;
      font-size: 10px;
      padding: 4px 12px;
      font-weight: 600;
      text-decoration: none;
    }
    
    .nav-item.active { color: #2196F3; }
    .nav-item .emoji { font-size: 24px; }
    
    /* Chat Bubbles */
    .chat-messages {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .chat-bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    
    .chat-bubble-row.user {
      justify-content: flex-end;
    }
    
    .chat-bubble-row.other {
      justify-content: flex-start;
    }
    
    .post-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #2196F3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    
    .chat-bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.4;
    }
    
    .chat-bubble.user {
      background: #1976D2;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    
    .chat-bubble.other {
      background: linear-gradient(135deg, rgba(33,150,243,0.15) 0%, rgba(0,188,212,0.12) 100%);
      border: 1px solid rgba(33,150,243,0.3);
      color: #90CAF9;
      border-bottom-left-radius: 4px;
    }
    
    .chat-time {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }
    
    .chat-bubble.other .chat-time {
      color: rgba(144,202,249,0.7);
    }
    
    .chat-input-wrapper {
      padding: 12px 16px 16px;
      background: #000;
      border-top: 0.5px solid rgba(255,255,255,0.08);
    }
    
    .chat-input {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .chat-input input {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 16px;
      border-radius: 20px;
      color: #fff;
      font-size: 15px;
    }
    
    .chat-input input::placeholder {
      color: #666;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="appbar">
        <a href="connections.html" class="back-btn">← Back</a>
        <div class="appbar-title">Chidinma</div>
        <div class="appbar-actions">
          <button class="icon-btn">ℹ️</button>
        </div>
      </div>
      <div class="content">
        <div class="chat-messages">
          <div class="chat-bubble-row other">
            <div class="post-avatar">C</div>
            <div class="chat-bubble other">
              Hey! Saw your post about 6.006
              <div class="chat-time">2:15 PM</div>
            </div>
          </div>
          
          <div class="chat-bubble-row user">
            <div class="chat-bubble user">
              Yes! Need all the help I can get 😅
              <div class="chat-time">2:16 PM</div>
            </div>
          </div>
          
          <div class="chat-bubble-row other">
            <div class="post-avatar">C</div>
            <div class="chat-bubble other">
              Same here. Want to meet up at the library?
              <div class="chat-time">2:18 PM</div>
            </div>
          </div>
          
          <div class="chat-bubble-row user">
            <div class="chat-bubble user">
              Perfect! 3pm work for you?
              <div class="chat-time">2:20 PM</div>
            </div>
          </div>
        </div>
      </div>
      <div class="chat-input-wrapper">
        <div class="chat-input">
          <input type="text" placeholder="Message Chidinma...">
        </div>
      </div>
      <div class="bottom-nav">
        <a href="feed.html" class="nav-item"><span class="emoji">📝</span>Posts</a>
        <a href="connections.html" class="nav-item"><span class="emoji">🏠</span>Connections</a>
        <a href="channels.html" class="nav-item"><span class="emoji">👥</span>Channels</a>
        <a href="profile.html" class="nav-item"><span class="emoji">👤</span>Profile</a>
      </div>
    </div>
  </div>
</body>
</html>
